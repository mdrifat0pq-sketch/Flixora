<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flixora - Asian & Hollywood Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h1 class="logo">Flixora</h1>
        <div class="nav-links">
            <button class="nav-btn active" data-tab="home">Home</button>
            <button class="nav-btn" data-tab="korean">Korean</button>
            <button class="nav-btn" data-tab="indonesian">Indonesian</button>
            <button class="nav-btn" data-tab="japanese">Japanese</button>
            <button class="nav-btn" data-tab="chinese">Chinese</button>
            <button class="nav-btn" data-tab="hollywood">Hollywood</button>
        </div>
        <input type="text" class="search-box" id="searchBox" placeholder="Search any movie..." autocomplete="off">
        <div class="search-results hidden" id="searchResults"></div>
    </nav>

    <!-- Hero Banner -->
    <section class="hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
            <div class="hero-badge">🔥 Trending Now</div>
            <h2 class="hero-title" id="heroTitle">Loading Flixora...</h2>
            <p class="hero-desc" id="heroDesc">Please wait while we load amazing content for you.</p>
            <div class="hero-meta" id="heroMeta"></div>
            <div class="hero-actions">
                <button class="btn-play" id="heroPlay">▶ Play Trailer</button>
                <button class="btn-info" id="heroInfo">ℹ Details</button>
            </div>
        </div>
    </section>

    <!-- Main Grid -->
    <main id="mainContent">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Loading content for you...</p>
        </div>
    </main>

    <!-- Trailer Modal -->
    <div class="modal-overlay hidden" id="trailerModal">
        <div class="trailer-container">
            <button class="modal-close" id="trailerClose">✕</button>
            <div id="youtubePlayer">Loading player...</div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div class="modal-overlay hidden" id="detailModal">
        <div class="modal">
            <button class="modal-close" id="detailClose">✕</button>
            <div class="modal-bg" id="modalBg"></div>
            <div class="modal-gradient"></div>
            <div class="modal-body">
                <h3 class="modal-title" id="modalTitle"></h3>
                <div class="modal-stats" id="modalStats"></div>
                <div class="modal-actions">
                    <button class="btn-play" id="modalPlay">▶ Play Trailer</button>
                </div>
                <p class="modal-overview" id="modalOverview"></p>
                <div class="modal-genres" id="modalGenres"></div>
                <div class="modal-cast" id="modalCast"></div>
                <div class="modal-similar" id="modalSimilar"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>

    <script src="app.js"></script>
</body>
    </html>
